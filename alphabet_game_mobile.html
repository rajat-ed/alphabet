<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlphaBet Mobile Blitz</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #1e1e2f;
            --neon-pink: #ff2a74;
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --text: #ffffff;
            --text-muted: #8f9cae;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .game-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            height: 85vh;
            max-height: 700px;
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 2px solid #2d2d44;
            position: relative;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text);
            margin-top: 20px;
        }

        h1 span {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .hero-desc {
            color: var(--text-muted);
            text-align: center;
            font-size: 1.05rem;
            line-height: 1.6;
            padding: 0 10px;
        }

        .letter-hero {
            font-size: 9rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            text-align: center;
            line-height: 1;
            margin: auto 0;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #2d2d44;
        }

        .hud-stat {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-stat span {
            color: var(--neon-blue);
        }

        .timer-badge {
            background: #ff9f00;
            color: #000;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 0 10px rgba(255, 159, 0, 0.4);
        }

        .question-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px 0;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.4;
            color: #fff;
        }

        .input-wrapper {
            margin-bottom: 10px;
        }

        .mobile-input {
            width: 100%;
            background: #131322;
            border: 2px solid #3d3d5c;
            border-radius: 16px;
            padding: 18px;
            font-size: 1.4rem;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.2s ease;
        }

        .mobile-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .btn-neon-pink { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px rgba(255, 42, 116, 0.3); }
        .btn-neon-blue { background: var(--neon-blue); color: #0b0f19; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }
        .btn-neon-green { background: var(--neon-green); color: #0b0f19; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); }
        .btn-outline { background: transparent; border: 2px solid #3d3d5c; color: var(--text); }

        .review-scroll {
            background: #131322;
            border-radius: 16px;
            padding: 12px;
            overflow-y: auto;
            flex-grow: 1;
            margin: 15px 0;
            border: 1px solid #2d2d44;
        }

        .review-card {
            padding: 10px;
            border-bottom: 1px solid #2d2d44;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.95rem;
        }

        .review-card:last-child { border: none; }
        .status-correct { color: var(--neon-green); font-weight: bold; }
        .status-wrong { color: var(--neon-pink); font-weight: bold; }
        .status-skip { color: var(--text-muted); }

        .flash-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
    </style>
</head>
<body>

    <div class="game-card">
        <div id="flash" class="flash-overlay"></div>

        <div id="scr-start" class="screen active">
            <h1>Alpha<span>Bet</span></h1>
            <p class="hero-desc">Rapid-fire vocabulary blitz. Accept a letter, or gamble it for a mystery draw—then answer as many questions as you can in 60 seconds.</p>
            <button class="action-btn btn-neon-pink" onclick="routeToSelection()">Launch Game</button>
        </div>

        <div id="scr-decision" class="screen">
            <h2 id="decision-header" style="text-align: center; color: var(--text-muted); font-weight: 600;">Your Offered Letter</h2>
            <div id="big-letter" class="letter-hero">M</div>
            <div class="btn-stack">
                <button class="action-btn btn-neon-green" onclick="confirmLetter()">Accept Letter</button>
                <button id="swap-action-btn" class="action-btn btn-outline" onclick="gambleLetter()">Gamble & Swap</button>
            </div>
        </div>

        <div id="scr-play" class="screen">
            <div class="hud">
                <div class="hud-stat">Score: <span id="hud-score">0</span></div>
                <div class="hud-stat">Letter: <span id="hud-letter" style="color:var(--neon-pink)">-</span></div>
                <div id="hud-timer" class="timer-badge">60s</div>
            </div>

            <div class="question-container">
                <div id="live-question" class="question-text">Loading question...</div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="touch-input" class="mobile-input" placeholder="Tap to type..." inputmode="text" enterkeyhint="next" autocomplete="off" autocorrect="off" autocapitalize="off">
            </div>

            <div class="btn-row">
                <button class="action-btn btn-outline" style="width: 35%;" onclick="skipQuestion()">Skip</button>
                <button class="action-btn btn-neon-blue" style="width: 65%;" onclick="handleMobileSubmit()">Submit</button>
            </div>
        </div>

        <div id="scr-results" class="screen">
            <h2 style="text-align: center; font-size: 1.8rem;">Round Over!</h2>
            <div style="text-align: center; margin: 10px 0;">
                <p style="color: var(--text-muted); font-size: 1rem;">Final Score with letter <strong id="summary-letter" style="color:var(--neon-blue)">-</strong></p>
                <h3 id="summary-score" style="font-size: 3.5rem; color: var(--neon-green); font-weight: 900;">0</h3>
            </div>
            
            <div id="score-log" class="review-scroll"></div>
            
            <button class="action-btn btn-neon-pink" onclick="resetToHome()">Play Again</button>
        </div>
    </div>

            "A pet care item", "A veterinary term", "An animal behavior", "A method of animal communication", "A migration destination indicator",
            "A habitat threat", "A conservation method", "A recycling method", "A waste management term", "A renewable energy device component",
            "A construction tool for measuring", "A fastening hardware piece", "A structural support type", "A plumbing fixture component", "An electrical wire type",

            "A computer peripheral for input", "An output device for computers", "A storage media type", "A data transmission cable", "A networking device",
            "A software application category", "An operating system utility", "A file format extension", "A cyber security threat", "A cryptographic term"
        ];

        let baseAlphabet = "ABCDEFGHIJKLMNOPQRSTUVWYZ".split(''); 
        let currentSelectionLetter = '';
        let phaseStep = 1; 
        let countdownTimer = null;
        let timeRemaining = 60;
        let runningScore = 0;
        let currentQuestionIdx = 0;
        let activeSessionQuestions = [];
        let historyLog = [];

        const scrStart = document.getElementById('scr-start');
        const scrDecision = document.getElementById('scr-decision');
        const scrPlay = document.getElementById('scr-play');
        const scrResults = document.getElementById('scr-results');
        const flashOverlay = document.getElementById('flash');
        const touchInput = document.getElementById('touch-input');

        function navigate(targetScreen) {
            [scrStart, scrDecision, scrPlay, scrResults].forEach(s => s.classList.remove('active'));
            targetScreen.classList.add('active');
        }

        function triggerFlash(color) {
            flashOverlay.style.background = color;
            flashOverlay.style.opacity = '0.2';
            setTimeout(() => { flashOverlay.style.opacity = '0'; }, 150);
        }

        function randomizedShuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function routeToSelection() {
            phaseStep = 1;
            const btnSwap = document.getElementById('swap-action-btn');
            btnSwap.style.display = 'flex';
            document.getElementById('decision-header').textContent = "Your Offered Letter";
            
            currentSelectionLetter = baseAlphabet[Math.floor(Math.random() * baseAlphabet.length)];
            document.getElementById('big-letter').textContent = currentSelectionLetter;
            navigate(scrDecision);
        }

        function gambleLetter() {
            if (phaseStep === 1) {
                phaseStep = 2;
                const filteredPool = baseAlphabet.filter(l => l !== currentSelectionLetter);
                currentSelectionLetter = filteredPool[Math.floor(Math.random() * filteredPool.length)];
                
                document.getElementById('big-letter').textContent = currentSelectionLetter;
                document.getElementById('decision-header').textContent = "Your Forced Final Letter";
                document.getElementById('swap-action-btn').style.display = 'none';
            }
        }

        function confirmLetter() {
            initiateGameplayLoop(currentSelectionLetter);
        }

        function initiateGameplayLoop(chosenLetter) {
            runningScore = 0;
            timeRemaining = 60;
            currentQuestionIdx = 0;
            historyLog = [];
            
            document.getElementById('hud-letter').textContent = chosenLetter;
            document.getElementById('hud-score').textContent = runningScore;
            document.getElementById('hud-timer').textContent = timeRemaining + "s";
            
            activeSessionQuestions = randomizedShuffle([...questionsList]);
            
            navigate(scrPlay);
            displayNextPrompt();
            
            touchInput.value = '';
            setTimeout(() => touchInput.focus(), 300);

            countdownTimer = setInterval(() => {
                timeRemaining--;
                document.getElementById('hud-timer').textContent = timeRemaining + "s";
                if (timeRemaining <= 0) {
                    wrapUpSession();
                }
            }, 1000);
        }

        function displayNextPrompt() {
            if (currentQuestionIdx >= activeSessionQuestions.length) {
                activeSessionQuestions = randomizedShuffle([...questionsList]);
                currentQuestionIdx = 0;
            }
            document.getElementById('live-question').textContent = activeSessionQuestions[currentQuestionIdx];
        }

        touchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleMobileSubmit();
            }
        });

        function handleMobileSubmit() {
            const evaluationText = touchInput.value.trim();
            const activePrompt = activeSessionQuestions[currentQuestionIdx];
            
            if (evaluationText === "") {
                skipQuestion();
                return;
            }

            const cleanInput = evaluationText.toLowerCase();
            const targetConstraint = currentSelectionLetter.toLowerCase();

            if (cleanInput.startsWith(targetConstraint)) {
                runningScore++;
                document.getElementById('hud-score').textContent = runningScore;
                triggerFlash('var(--neon-green)');
                historyLog.push({ q: activePrompt, a: evaluationText, type: 'correct' });
            } else {
                triggerFlash('var(--neon-pink)');
                historyLog.push({ q: activePrompt, a: `${evaluationText} (Must start with ${currentSelectionLetter})`, type: 'wrong' });
            }

            touchInput.value = '';
            currentQuestionIdx++;
            displayNextPrompt();
            touchInput.focus();
        }

        function skipQuestion() {
            historyLog.push({ q: activeSessionQuestions[currentQuestionIdx], a: "[Skipped]", type: 'skip' });
            touchInput.value = '';
            currentQuestionIdx++;
            displayNextPrompt();
            touchInput.focus();
        }

        function wrapUpSession() {
            clearInterval(countdownTimer);
            touchInput.blur();
            
            document.getElementById('summary-letter').textContent = currentSelectionLetter;
            document.getElementById('summary-score').textContent = runningScore;
            
            const listScroller = document.getElementById('score-log');
            listScroller.innerHTML = '';

            if (historyLog.length === 0) {
                listScroller.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted)">No answers attempted!</div>`;
            } else {
                historyLog.forEach(entry => {
                    const row = document.createElement('div');
                    row.className = 'review-card';
                    
                    let statusLabel = 'status-skip';
                    if (entry.type === 'correct') statusLabel = 'status-correct';
                    if (entry.type === 'wrong') statusLabel = 'status-wrong';

                    row.innerHTML = `
                        <span style="color: #fff;"><strong>Q:</strong> ${entry.q}</span>
                        <span class="${statusLabel}"><strong>A:</strong> ${entry.a}</span>
                    `;
                    listScroller.appendChild(row);
                });
            }

            navigate(scrResults);
        }

        function resetToHome() {
            navigate(scrStart);
        }
    </script>
</body>
</html>
