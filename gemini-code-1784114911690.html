<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHABET: ARCADE BLITZ ORAL</title>
    <style>
        :root {
            --bg: #03030c;
            --card-bg: #0d0d21;
            --neon-pink: #ff007f;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
            --neon-yellow: #ffdf00;
            --text: #ffffff;
            --text-muted: #65758d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Impact', 'Arial Black', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .game-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 440px;
            height: 92vh;
            border-radius: 30px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.25), inset 0 0 15px rgba(255, 0, 127, 0.2);
            border: 3px solid #1a1a3a;
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            font-size: 4.2rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text);
            line-height: 0.9;
            margin-top: 10px;
            transform: rotate(-2deg);
            animation: pulseGlow 1.5s infinite alternate;
        }

        h1 span {
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
        }

        .section-label {
            color: var(--neon-blue);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: center;
        }

        .time-grid {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 15px;
        }

        .time-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: 900;
            background: #151535;
            border: 3px solid #2a2a5a;
            color: var(--text);
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s ease;
        }

        .time-btn.selected {
            background: var(--neon-blue);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .letter-hero {
            font-size: 12rem;
            color: var(--neon-blue);
            text-shadow: 0 0 40px var(--neon-blue), 0 0 70px var(--neon-blue);
            text-align: center;
            line-height: 0.8;
            margin: auto 0;
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .action-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.6rem;
            font-weight: 900;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #000;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #000;
        }

        /* Giant Scoring Pads for Oral Gameplay */
        .score-pad {
            height: 18vh;
            font-size: 2.2rem;
            letter-spacing: 2px;
            border-radius: 24px;
            box-shadow: 0 8px 0 #000;
        }

        .score-pad:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #000;
        }

        .btn-neon-pink { background: var(--neon-pink); color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-neon-blue { background: var(--neon-blue); color: #000; }
        .btn-neon-green { background: var(--neon-green); color: #000; text-shadow: 0 1px 2px rgba(255,255,255,0.6); }
        .btn-outline { background: #151535; border: 3px solid #2a2a5a; color: var(--text); }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 3px dashed #2a2a5a;
        }

        .hud-stat {
            font-size: 1.3rem;
            text-transform: uppercase;
        }

        .hud-stat span {
            color: var(--neon-blue);
            font-size: 1.6rem;
        }

        .timer-badge {
            background: var(--neon-yellow);
            color: #000;
            padding: 6px 20px;
            border-radius: 12px;
            font-size: 1.5rem;
            box-shadow: 0 0 15px rgba(255, 223, 0, 0.4);
        }

        .question-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px 0;
            gap: 15px;
        }

        .question-emoji {
            font-size: 6.5rem;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.25));
            animation: popIn 0.25s ease;
        }

        .question-text {
            font-size: 2.3rem;
            line-height: 1.1;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 5px;
        }

        .review-scroll {
            background: #060614;
            border-radius: 20px;
            padding: 12px;
            overflow-y: auto;
            flex-grow: 1;
            margin: 15px 0;
            border: 2px solid #2a2a5a;
        }

        .review-card {
            padding: 12px;
            border-bottom: 1px solid #1a1a3a;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 1.1rem;
            font-family: sans-serif;
        }

        .status-correct { color: var(--neon-green); font-weight: bold; font-size: 1.2rem; }
        .status-wrong { color: var(--neon-pink); font-weight: bold; font-size: 1.2rem; }

        .flash-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 26px;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            transition: opacity 0.08s ease;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px rgba(255,255,255,0.2); }
            100% { text-shadow: 0 0 25px var(--neon-blue); transform: rotate(2deg) scale(1.03); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .shake-animation {
            animation: violentShake 0.15s linear infinite;
        }

        @keyframes violentShake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>

    <div id="game-container" class="game-card">
        <div id="flash" class="flash-overlay"></div>

        <!-- SCREEN 1: THE WELCOME SCREEN -->
        <div id="scr-start" class="screen active">
            <h1>Alpha<span>Bet</span></h1>
            
            <div style="margin: auto 0; width: 100%;">
                <div class="section-label">SELECT ORAL ROUND TIME</div>
                <div class="time-grid">
                    <button class="time-btn" onclick="setTimeLimit(30, this)">30s</button>
                    <button class="time-btn selected" onclick="setTimeLimit(60, this)">60s</button>
                    <button class="time-btn" onclick="setTimeLimit(90, this)">90s</button>
                </div>
                <div class="section-label" style="color: var(--text-muted); font-size: 0.95rem; font-family: sans-serif; font-weight: bold; line-height: 1.3;">
                    ORAL CHALLENGE MODE: READ THE CARD ALOUD, SAY YOUR ANSWER, AND TRACK PASS/FAIL MANUALLY BY TAPPING THE SCREEN FAST!
                </div>
            </div>

            <button class="action-btn btn-neon-pink" onclick="routeToSelection()">START ORAL ROUND</button>
        </div>

        <!-- SCREEN 2: LETTER SELECTION GAMBLE -->
        <div id="scr-decision" class="screen">
            <h2 id="decision-header" style="text-align: center; color: var(--neon-pink); font-size: 2rem;">OFFERED LETTER</h2>
            <div id="big-letter" class="letter-hero">G</div>
            <div class="btn-stack">
                <button class="action-btn btn-neon-green" onclick="confirmLetter()">LOCK IT IN!</button>
                <button id="swap-action-btn" class="action-btn btn-outline" onclick="gambleLetter()">GAMBLE & SWAP</button>
            </div>
        </div>

        <!-- SCREEN 3: ACTIVE GAMEPLAY LOOP -->
        <div id="scr-play" class="screen">
            <div class="hud">
                <div class="hud-stat">SCORE: <span id="hud-score">0</span></div>
                <div class="hud-stat">LETTER: <span id="hud-letter" style="color:var(--neon-pink)">-</span></div>
                <div id="hud-timer" class="timer-badge">60s</div>
            </div>

            <div class="question-container">
                <div id="live-emoji" class="question-emoji">⚡</div>
                <div id="live-question" class="question-text">LOADING BLITZ...</div>
            </div>

            <!-- Giant Score Capture Buttons (No input typing field) -->
            <div class="btn-stack" style="gap: 16px;">
                <button class="action-btn btn-neon-green score-pad" onclick="markOralPoint(true)">CORRECT (PASS)</button>
                <button class="action-btn btn-neon-pink score-pad" onclick="markOralPoint(false)">WRONG / SKIP</button>
            </div>
        </div>

        <!-- SCREEN 4: ROUND RESULTS RECAP -->
        <div id="scr-results" class="screen">
            <h2 style="text-align: center; font-size: 2.5rem; color: var(--neon-pink);">ROUND END!</h2>
            <div style="text-align: center; margin: 5px 0;">
                <p style="color: var(--text-muted); font-size: 1.2rem; text-transform: uppercase;">LETTER <strong id="summary-letter" style="color:var(--neon-blue)">-</strong> SCORE</p>
                <h3 id="summary-score" style="font-size: 5.5rem; color: var(--neon-green); font-weight: 900; line-height: 1;">0</h3>
            </div>
            
            <div id="score-log" class="review-scroll"></div>
            
            <button class="action-btn btn-neon-pink" onclick="resetToHome()">PLAY AGAIN</button>
        </div>
    </div>

        let baseAlphabet = "ABCDEFGHIJKLMNOPQRSTUVWYZ".split(''); 
        let currentSelectionLetter = '';
        let phaseStep = 1; 
        let countdownTimer = null;
        let selectedTimeLimit = 60; 
        let timeRemaining = 60;
        let runningScore = 0;
        let currentQuestionIdx = 0;
        let activeSessionQuestions = [];
        let historyLog = [];

        // DOM Handles
        const gameContainer = document.getElementById('game-container');
        const scrStart = document.getElementById('scr-start');
        const scrDecision = document.getElementById('scr-decision');
        const scrPlay = document.getElementById('scr-play');
        const scrResults = document.getElementById('scr-results');
        const flashOverlay = document.getElementById('flash');

        function setTimeLimit(seconds, targetElement) {
            selectedTimeLimit = seconds;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('selected'));
            targetElement.classList.add('selected');
            triggerBallisticEffects('var(--neon-blue)', false);
        }

        function navigate(targetScreen) {
            [scrStart, scrDecision, scrPlay, scrResults].forEach(s => s.classList.remove('active'));
            targetScreen.classList.add('active');
        }

        function triggerBallisticEffects(color, needsShake) {
            flashOverlay.style.background = color;
            flashOverlay.style.opacity = '0.4';
            setTimeout(() => { flashOverlay.style.opacity = '0'; }, 100);

            if (needsShake) {
                gameContainer.classList.add('shake-animation');
                setTimeout(() => { gameContainer.classList.remove('shake-animation'); }, 200);
            }
        }

        function randomizedShuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function routeToSelection() {
            phaseStep = 1;
            const btnSwap = document.getElementById('swap-action-btn');
            btnSwap.style.display = 'flex';
            document.getElementById('decision-header').textContent = "OFFERED LETTER";
            document.getElementById('decision-header').style.color = "var(--neon-pink)";
            
            currentSelectionLetter = baseAlphabet[Math.floor(Math.random() * baseAlphabet.length)];
            document.getElementById('big-letter').textContent = currentSelectionLetter;
            navigate(scrDecision);
        }

        function gambleLetter() {
            if (phaseStep === 1) {
                phaseStep = 2;
                const filteredPool = baseAlphabet.filter(l => l !== currentSelectionLetter);
                currentSelectionLetter = filteredPool[Math.floor(Math.random() * filteredPool.length)];
                
                document.getElementById('big-letter').textContent = currentSelectionLetter;
                document.getElementById('decision-header').textContent = "FORCED FINAL LETTER";
                document.getElementById('decision-header').style.color = "var(--neon-yellow)";
                document.getElementById('swap-action-btn').style.display = 'none';
                triggerBallisticEffects('var(--neon-pink)', true);
            }
        }

        function confirmLetter() {
            initiateGameplayLoop(currentSelectionLetter);
        }

        function initiateGameplayLoop(chosenLetter) {
            runningScore = 0;
            timeRemaining = selectedTimeLimit; 
            currentQuestionIdx = 0;
            historyLog = [];
            
            document.getElementById('hud-letter').textContent = chosenLetter;
            document.getElementById('hud-score').textContent = runningScore;
            document.getElementById('hud-timer').textContent = timeRemaining + "s";
            
            activeSessionQuestions = randomizedShuffle([...questionsList]);
            
            navigate(scrPlay);
            displayNextPrompt();

            countdownTimer = setInterval(() => {
                timeRemaining--;
                document.getElementById('hud-timer').textContent = timeRemaining + "s";
                if (timeRemaining <= 10) {
                    document.getElementById('hud-timer').style.background = 'var(--neon-pink)';
                    document.getElementById('hud-timer').style.color = '#fff';
                } else {
                    document.getElementById('hud-timer').style.background = 'var(--neon-yellow)';
                    document.getElementById('hud-timer').style.color = '#000';
                }
                if (timeRemaining <= 0) {
                    wrapUpSession();
                }
            }, 1000);
        }

        function displayNextPrompt() {
            if (currentQuestionIdx >= activeSessionQuestions.length) {
                activeSessionQuestions = randomizedShuffle([...questionsList]);
                currentQuestionIdx = 0;
            }
            const dataEntry = activeSessionQuestions[currentQuestionIdx];
            document.getElementById('live-emoji').textContent = dataEntry.e;
            document.getElementById('live-question').textContent = dataEntry.q;
        }

        // Handle oral point recording via clicking giant pads directly
        function markOralPoint(isCorrect) {
            const activePrompt = activeSessionQuestions[currentQuestionIdx];
            
            if (isCorrect) {
                runningScore++;
                document.getElementById('hud-score').textContent = runningScore;
                triggerBallisticEffects('var(--neon-green)', false);
                historyLog.push({ q: activePrompt.q, type: 'correct', e: activePrompt.e });
            } else {
                triggerBallisticEffects('var(--neon-pink)', true);
                historyLog.push({ q: activePrompt.q, type: 'wrong', e: activePrompt.e });
            }

            currentQuestionIdx++;
            displayNextPrompt();
        }

        function wrapUpSession() {
            clearInterval(countdownTimer);
            triggerBallisticEffects('var(--neon-blue)', true);
            
            document.getElementById('summary-letter').textContent = currentSelectionLetter;
            document.getElementById('summary-score').textContent = runningScore;
            
            const listScroller = document.getElementById('score-log');
            listScroller.innerHTML = '';

            if (historyLog.length === 0) {
                listScroller.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted)">NO QUESTIONS ANSWERED!</div>`;
            } else {
                historyLog.forEach(entry => {
                    const row = document.createElement('div');
                    row.className = 'review-card';
                    
                    let statusLabel = 'status-wrong';
                    let textMark = 'FAILED / SKIPPED';
                    if (entry.type === 'correct') {
                        statusLabel = 'status-correct';
                        textMark = 'PASSED';
                    }

                    row.innerHTML = `
                        <span style="color: #fff; font-weight:bold; text-transform: uppercase;">${entry.e} Q: ${entry.q}</span>
                        <span class="${statusLabel}">OUTCOME: ${textMark}</span>
                    `;
                    listScroller.appendChild(row);
                });
            }

            navigate(scrResults);
        }

        function resetToHome() {
            navigate(scrStart);
        }
