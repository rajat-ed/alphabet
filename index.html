<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHABET: ARCADE BLITZ ORAL</title>
    <style>
        :root {
            --bg: #03030c;
            --card-bg: #0d0d21;
            --neon-pink: #ff007f;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
            --neon-yellow: #ffdf00;
            --text: #ffffff;
            --text-muted: #65758d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Impact', 'Arial Black', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Fixed viewport fit container - absolutely zero scrolling */
        .game-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            height: 96vh;
            border-radius: 24px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.25), inset 0 0 15px rgba(255, 0, 127, 0.2);
            border: 3px solid #1a1a3a;
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            width: 100%;
            overflow: hidden;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            font-size: 3.8rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text);
            line-height: 0.9;
            margin-top: 5px;
            transform: rotate(-1deg);
            animation: pulseGlow 1.5s infinite alternate;
        }

        h1 span {
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink);
        }

        .section-label {
            color: var(--neon-blue);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-align: center;
        }

        .time-grid {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-bottom: 12px;
        }

        .time-btn {
            flex: 1;
            padding: 10px;
            font-size: 1.1rem;
            font-weight: 900;
            background: #151535;
            border: 3px solid #2a2a5a;
            color: var(--text);
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .time-btn.selected {
            background: var(--neon-blue);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        .letter-hero {
            font-size: 10rem;
            color: var(--neon-blue);
            text-shadow: 0 0 30px var(--neon-blue);
            text-align: center;
            line-height: 0.8;
            margin: auto 0;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.4rem;
            font-weight: 900;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 #000;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #000;
        }

        /* Tactile pads fitted beautifully inside viewport constraints */
        .score-pad {
            height: 14vh;
            font-size: 1.8rem;
            letter-spacing: 1px;
            border-radius: 18px;
        }

        .btn-neon-pink { background: var(--neon-pink); color: #fff; }
        .btn-neon-blue { background: var(--neon-blue); color: #000; }
        .btn-neon-green { background: var(--neon-green); color: #000; }
        .btn-outline { background: #151535; border: 3px solid #2a2a5a; color: var(--text); }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 3px dashed #2a2a5a;
        }

        .hud-stat {
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .hud-stat span {
            color: var(--neon-blue);
            font-size: 1.4rem;
        }

        .timer-badge {
            background: var(--neon-yellow);
            color: #000;
            padding: 4px 14px;
            border-radius: 8px;
            font-size: 1.3rem;
        }

        /* Dynamically scales spacing down to prioritize screen stability */
        .question-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5px 0;
            gap: 8px;
            overflow: hidden;
        }

        .question-emoji {
            font-size: 5rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .question-text {
            font-size: 1.8rem;
            line-height: 1.1;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            max-height: 100px;
            overflow: hidden;
        }

        .review-scroll {
            background: #060614;
            border-radius: 16px;
            padding: 8px;
            overflow-y: auto;
            flex-grow: 1;
            margin: 10px 0;
            border: 2px solid #2a2a5a;
        }

        .review-card {
            padding: 8px;
            border-bottom: 1px solid #1a1a3a;
            display: flex;
            flex-direction: column;
            font-size: 0.95rem;
            font-family: sans-serif;
        }

        .status-correct { color: var(--neon-green); font-weight: bold; }
        .status-wrong { color: var(--neon-pink); font-weight: bold; }

        .flash-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            transition: opacity 0.08s ease;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 8px rgba(255,255,255,0.2); }
            100% { text-shadow: 0 0 20px var(--neon-blue); transform: rotate(1deg) scale(1.02); }
        }
    </style>
</head>
<body>

    <div id="game-container" class="game-card">
        <div id="flash" class="flash-overlay"></div>

        <!-- SCREEN 1: THE WELCOME SCREEN -->
        <div id="scr-start" class="screen active">
            <h1>Alpha<span>Bet</span></h1>
            
            <div style="margin: auto 0; width: 100%;">
                <div class="section-label">SELECT ORAL ROUND TIME</div>
                <div class="time-grid">
                    <button class="time-btn" onclick="setTimeLimit(30, this)">30s</button>
                    <button class="time-btn selected" onclick="setTimeLimit(60, this)">60s</button>
                    <button class="time-btn" onclick="setTimeLimit(90, this)">90s</button>
                </div>
                <div class="section-label" style="color: var(--text-muted); font-size: 0.85rem; font-family: sans-serif; font-weight: bold; line-height: 1.2;">
                    ORAL MODE: READ CARDS ALOUD, SAY YOUR ANSWER, RECORD RESULTS FAST VIA PADS.
                </div>
            </div>

            <button class="action-btn btn-neon-pink" onclick="routeToSelection()">START ROUND</button>
        </div>

        <!-- SCREEN 2: LETTER SELECTION GAMBLE -->
        <div id="scr-decision" class="screen">
            <h2 id="decision-header" style="text-align: center; color: var(--neon-pink); font-size: 1.6rem;">OFFERED LETTER</h2>
            <div id="big-letter" class="letter-hero">G</div>
            <div class="btn-stack">
                <button class="action-btn btn-neon-green" onclick="confirmLetter()">LOCK IT IN!</button>
                <button id="swap-action-btn" class="action-btn btn-outline" onclick="gambleLetter()">GAMBLE & SWAP</button>
            </div>
        </div>

        <!-- SCREEN 3: ACTIVE GAMEPLAY LOOP -->
        <div id="scr-play" class="screen">
            <div class="hud">
                <div class="hud-stat">SCORE: <span id="hud-score">0</span></div>
                <div class="hud-stat">LETTER: <span id="hud-letter" style="color:var(--neon-pink)">-</span></div>
                <div id="hud-timer" class="timer-badge">60s</div>
            </div>

            <div class="question-container">
                <div id="live-emoji" class="question-emoji">⚡</div>
                <div id="live-question" class="question-text">LOADING...</div>
            </div>

            <div class="btn-stack" style="gap: 10px;">
                <button class="action-btn btn-neon-green score-pad" onclick="markOralPoint(true)">CORRECT (PASS)</button>
                <button class="action-btn btn-neon-pink score-pad" onclick="markOralPoint(false)">WRONG / SKIP</button>
            </div>
        </div>

        <!-- SCREEN 4: ROUND RESULTS RECAP -->
        <div id="scr-results" class="screen">
            <h2 style="text-align: center; font-size: 2rem; color: var(--neon-pink);">ROUND END!</h2>
            <div style="text-align: center; margin: 2px 0;">
                <p style="color: var(--text-muted); font-size: 1rem; text-transform: uppercase;">LETTER <strong id="summary-letter" style="color:var(--neon-blue)">-</strong> SCORE</p>
                <h3 id="summary-score" style="font-size: 4rem; color: var(--neon-green); font-weight: 900; line-height: 1;">0</h3>
            </div>
            
            <div id="score-log" class="review-scroll"></div>
            
            <button class="action-btn btn-neon-pink" onclick="resetToHome()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Data Bank injection
        const questionsList = [
            {q: "A type of fruit", e: "🍎"}, {q: "A country in Europe", e: "🇪🇺"}, {q: "An item found in a kitchen", e: "🍳"}, {q: "A profession or job", e: "💼"}, {q: "A cold-blooded animal", e: "🦎"},
            {q: "Something you wear on your feet", e: "👟"}, {q: "A capital city", e: "🏙️"}, {q: "A musical instrument", e: "🎸"}, {q: "Something found in space", e: "🚀"}, {q: "A color", e: "🎨"},
            {q: "A language spoken somewhere in the world", e: "🗣️"}, {q: "An ocean or sea", e: "🌊"}, {q: "A popular boy's name", e: "👦"}, {q: "A popular girl's name", e: "👧"}, {q: "A type of flower", e: "🌻"},
            {q: "A wild animal", e: "🦁"}, {q: "A domestic pet", e: "🐶"}, {q: "Something you find at a beach", e: "🏖️"}, {q: "A school subject", e: "📚"}, {q: "A type of vehicle", e: "🚗"},
            {q: "Something found in a bathroom", e: "🛁"}, {q: "An element on the periodic table", e: "🧪"}, {q: "A sport or physical game", e: "⚽"}, {q: "A piece of furniture", e: "🛋️"}, {q: "A tool found in a garage", e: "🔧"},
            {q: "A reason for being late", e: "⏰"}, {q: "Something soft", e: "🧸"}, {q: "Something hot", e: "🔥"}, {q: "Something cold", e: "❄️"}, {q: "A spice or herb", e: "🌿"},
            {q: "A sharp object", e: "🔪"}, {q: "Something made of wood", e: "🪵"}, {q: "Something transparent", e: "🔍"}, {q: "A bird species", e: "🦅"}, {q: "An insect", e: "🪲"},
            {q: "A clothing brand", e: "👕"}, {q: "A country in Asia", e: "🌏"}, {q: "A country in Africa", e: "🌍"}, {q: "A U.S. State", e: "🇺🇸"}, {q: "Something you see in a hospital", e: "🏥"},
            {q: "A weapon", e: "⚔️"}, {q: "A gemstone or crystal", e: "💎"}, {q: "A type of tree", e: "🌲"}, {q: "Something rectangular", e: "📦"}, {q: "Something spherical", e: "🔮"},
            {q: "A cartoon character", e: "👾"}, {q: "A historical figure", e: "👑"}, {q: "A type of fabric or textile", e: "🧵"}, {q: "A computer component", e: "💾"}, {q: "A reason to celebrate", e: "🎉"},
            {q: "Something that smells good", e: "🌸"}, {q: "Something that smells bad", e: "🦨"}, {q: "An outdoor hobby", e: "🎣"}, {q: "An indoor hobby", e: "🧩"}, {q: "A mythical creature", e: "🦄"},
            {q: "A type of dance", e: "💃"}, {q: "A beverage or drink", e: "🍹"}, {q: "A breakfast food", e: "🥞"}, {q: "A dessert or sweet treat", e: "🍰"}, {q: "A green vegetable", e: "🥦"},
            {q: "A body part", e: "💪"}, {q: "An internal organ", e: "🫁"}, {q: "A unit of measurement", e: "📏"}, {q: "A type of metal", e: "🪙"}, {q: "Something associated with Halloween", e: "🎃"},
            {q: "Something associated with Christmas", e: "🎄"}, {q: "A weather condition", e: "☀️"}, {q: "A natural disaster", e: "🌪️"}, {q: "A shape", e: "📐"}, {q: "A type of currency", e: "💵"},
            {q: "Something you turn on with a switch", e: "💡"}, {q: "A type of snake", e: "🐍"}, {q: "Something found in a library", e: "🏛️"}, {q: "A type of footwear", e: "👠"}, {q: "A dinosaur", e: "🦕"},
            {q: "A liquid", e: "💧"}, {q: "A gas", e: "💨"}, {q: "A solid", e: "🧱"}, {q: "Something that floats", e: "🦆"}, {q: "Something that sinks", e: "⚓"},
            {q: "A type of nut", e: "🥜"}, {q: "A grain or cereal crop", e: "🌾"}, {q: "A seafood item", e: "🦞"}, {q: "A fast food chain", e: "🍔"}, {q: "A superhero", e: "🦸‍♂️"},
            {q: "A supervillain", e: "🦹‍♂️"}, {q: "An architectural feature", e: "🏛️"}, {q: "A type of boat or ship", e: "🚢"}, {q: "Something you find in a wallet", e: "💳"}, {q: "A type of candy", e: "🍬"},
            {q: "A dangerous hobby", e: "🧗"}, {q: "A farm animal", e: "🐖"}, {q: "Something found in a forest", e: "🌲"}, {q: "Something found in a desert", e: "🌵"}, {q: "A type of crime", e: "🕵️‍♂️"},
            {q: "A standard school supply", e: "✏️"}, {q: "A component of a car", e: "🚗"}, {q: "A type of hat", e: "🎩"}, {q: "A famous landmark", e: "🗼"}, {q: "A dog breed", e: "🦮"},
            {q: "A cat breed", e: "🐈"}, {q: "Something you do at the gym", e: "🏋️‍♂️"}, {q: "A major world river", e: "🏞️"}, {q: "A mountain or mountain range", e: "🏔️"}, {q: "A type of shoes", e: "👞"},
            {q: "Something with a screen", e: "📱"}, {q: "A piece of luggage or bag", e: "💼"}, {q: "A type of pasta", e: "🍝"}, {q: "A pizza topping", e: "🍕"}, {q: "An ingredient in a cake", e: "🥚"},
            {q: "A winter sport", e: "⛷️"}, {q: "A summer sport", e: "SURFING 🏄‍♂️"}, {q: "Something you pack for a vacation", e: "🧳"}, {q: "An office supply", e: "📎"}, {q: "A type of cheese", e: "🧀"}
        ];

        let baseAlphabet = "ABCDEFGHIJKLMNOPQRSTUVWYZ".split(''); 
        let currentSelectionLetter = '';
        let phaseStep = 1; 
        let countdownTimer = null;
        let selectedTimeLimit = 60; 
        let timeRemaining = 60;
        let runningScore = 0;
        let currentQuestionIdx = 0;
        let activeSessionQuestions = [];
        let historyLog = [];

        const gameContainer = document.getElementById('game-container');
        const scrStart = document.getElementById('scr-start');
        const scrDecision = document.getElementById('scr-decision');
        const scrPlay = document.getElementById('scr-play');
        const scrResults = document.getElementById('scr-results');
        const flashOverlay = document.getElementById('flash');

        function setTimeLimit(seconds, targetElement) {
            selectedTimeLimit = seconds;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('selected'));
            targetElement.classList.add('selected');
            triggerBallisticEffects('var(--neon-blue)', false);
        }

        function navigate(targetScreen) {
            [scrStart, scrDecision, scrPlay, scrResults].forEach(s => s.classList.remove('active'));
            targetScreen.classList.add('active');
        }

        function triggerBallisticEffects(color, needsShake) {
            flashOverlay.style.background = color;
            flashOverlay.style.opacity = '0.4';
            setTimeout(() => { flashOverlay.style.opacity = '0'; }, 100);

            if (needsShake) {
                gameContainer.classList.add('shake-animation');
                setTimeout(() => { gameContainer.classList.remove('shake-animation'); }, 200);
            }
        }

        function randomizedShuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function routeToSelection() {
            phaseStep = 1;
            const btnSwap = document.getElementById('swap-action-btn');
            btnSwap.style.display = 'flex';
            document.getElementById('decision-header').textContent = "OFFERED LETTER";
            document.getElementById('decision-header').style.color = "var(--neon-pink)";
            
            currentSelectionLetter = baseAlphabet[Math.floor(Math.random() * baseAlphabet.length)];
            document.getElementById('big-letter').textContent = currentSelectionLetter;
            navigate(scrDecision);
        }

        function gambleLetter() {
            if (phaseStep === 1) {
                phaseStep = 2;
                const filteredPool = baseAlphabet.filter(l => l !== currentSelectionLetter);
                currentSelectionLetter = filteredPool[Math.floor(Math.random() * filteredPool.length)];
                
                document.getElementById('big-letter').textContent = currentSelectionLetter;
                document.getElementById('decision-header').textContent = "FORCED FINAL LETTER";
                document.getElementById('decision-header').style.color = "var(--neon-yellow)";
                document.getElementById('swap-action-btn').style.display = 'none';
                triggerBallisticEffects('var(--neon-pink)', true);
            }
        }

        function confirmLetter() {
            initiateGameplayLoop(currentSelectionLetter);
        }

        function initiateGameplayLoop(chosenLetter) {
            runningScore = 0;
            timeRemaining = selectedTimeLimit; 
            currentQuestionIdx = 0;
            historyLog = [];
            
            document.getElementById('hud-letter').textContent = chosenLetter;
            document.getElementById('hud-score').textContent = runningScore;
            document.getElementById('hud-timer').textContent = timeRemaining + "s";
            
            activeSessionQuestions = randomizedShuffle([...questionsList]);
            
            navigate(scrPlay);
            displayNextPrompt();

            countdownTimer = setInterval(() => {
                timeRemaining--;
                document.getElementById('hud-timer').textContent = timeRemaining + "s";
                if (timeRemaining <= 10) {
                    document.getElementById('hud-timer').style.background = 'var(--neon-pink)';
                    document.getElementById('hud-timer').style.color = '#fff';
                }
                if (timeRemaining <= 0) {
                    wrapUpSession();
                }
            }, 1000);
        }

        function displayNextPrompt() {
            if (currentQuestionIdx >= activeSessionQuestions.length) {
                activeSessionQuestions = randomizedShuffle([...questionsList]);
                currentQuestionIdx = 0;
            }
            const dataEntry = activeSessionQuestions[currentQuestionIdx];
            document.getElementById('live-emoji').textContent = dataEntry.e;
            document.getElementById('live-question').textContent = dataEntry.q;
        }

        function markOralPoint(isCorrect) {
            const activePrompt = activeSessionQuestions[currentQuestionIdx];
            
            if (isCorrect) {
                runningScore++;
                document.getElementById('hud-score').textContent = runningScore;
                triggerBallisticEffects('var(--neon-green)', false);
                historyLog.push({ q: activePrompt.q, type: 'correct', e: activePrompt.e });
            } else {
                triggerBallisticEffects('var(--neon-pink)', true);
                historyLog.push({ q: activePrompt.q, type: 'wrong', e: activePrompt.e });
            }

            currentQuestionIdx++;
            displayNextPrompt();
        }

        function wrapUpSession() {
            clearInterval(countdownTimer);
            triggerBallisticEffects('var(--neon-blue)', true);
            
            document.getElementById('summary-letter').textContent = currentSelectionLetter;
            document.getElementById('summary-score').textContent = runningScore;
            
            const listScroller = document.getElementById('score-log');
            listScroller.innerHTML = '';

            historyLog.forEach(entry => {
                const row = document.createElement('div');
                row.className = 'review-card';
                let statusLabel = entry.type === 'correct' ? 'status-correct' : 'status-wrong';
                let textMark = entry.type === 'correct' ? 'PASSED' : 'FAILED/SKIPPED';

                row.innerHTML = `
                    <span style="color: #fff; font-weight:bold;">${entry.e} Q: ${entry.q}</span>
                    <span class="${statusLabel}">OUTCOME: ${textMark}</span>
                `;
                listScroller.appendChild(row);
            });

            navigate(scrResults);
        }

        function resetToHome() {
            navigate(scrStart);
        }
    </script>
</body>
</html>
