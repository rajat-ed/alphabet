<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root {
            --bg: #020208;
            --card-bg: #090916;
            --panel-bg: #12122c;
            --neon-pink: #ff0066;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
            --neon-yellow: #ffcc00;
            --text: #ffffff;
            --text-muted: #7889a4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Impact', 'Arial Black', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Responsive Container: Fullscreen on mobile, contained card on desktop */
        .game-card {
            background: var(--card-bg);
            width: 100%;
            height: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
        }

        @media (min-width: 480px) {
            .game-card {
                height: 92vh;
                border-radius: 28px;
                border: 3px solid #1e1e3f;
            }
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        /* Top Header Styling */
        .brand-header {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            flex-shrink: 0;
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text);
            line-height: 1;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            animation: pulseGlow 2s infinite alternate;
        }

        h1 span {
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink);
        }

        /* Main Content Core Grid Allocation */
        .main-content-area {
            flex-grow: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            overflow: hidden;
            padding: 10px 0;
        }

        .section-label {
            color: var(--neon-blue);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Configuration Layout elements */
        .time-box-wrapper {
            width: 100%;
            background: var(--panel-bg);
            padding: 16px;
            border-radius: 20px;
            border: 2px solid #1e1e3f;
        }

        .time-grid {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .time-btn {
            flex: 1;
            padding: 14px 0;
            font-size: 1.3rem;
            font-weight: 900;
            background: #050510;
            border: 3px solid #25254e;
            color: var(--text);
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s ease;
        }

        .time-btn.selected {
            background: var(--neon-blue);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .mode-description {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-family: sans-serif;
            font-weight: bold;
            line-height: 1.4;
            text-align: center;
            text-transform: uppercase;
            padding: 0 10px;
        }

        .letter-hero {
            font-size: 11rem;
            color: var(--neon-blue);
            text-shadow: 0 0 35px var(--neon-blue);
            text-align: center;
            line-height: 0.8;
            margin: 10px 0;
        }

        /* HUD Bar Configuration */
        .hud {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 3px dashed #1e1e3f;
            flex-shrink: 0;
        }

        .hud-stat {
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .hud-stat span {
            color: var(--neon-blue);
            font-size: 1.5rem;
        }

        .timer-badge {
            background: var(--neon-yellow);
            color: #000;
            padding: 6px 16px;
            border-radius: 10px;
            font-size: 1.4rem;
            font-weight: 900;
        }

        /* Interactive Card Component Layouts */
        .question-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 15px;
            width: 100%;
        }

        .question-emoji {
            font-size: 6rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            line-height: 1;
        }

        .question-text {
            font-size: 2.2rem;
            line-height: 1.1;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 5px;
        }

        /* Giant Control Buttons Layout Block */
        .footer-action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
            padding-bottom: 10px;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #000;
            transition: transform 0.05s ease;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #000;
        }

        .score-pad {
            padding: 24px;
            font-size: 1.8rem;
        }

        .btn-neon-pink { background: var(--neon-pink); color: #fff; }
        .btn-neon-blue { background: var(--neon-blue); color: #000; }
        .btn-neon-green { background: var(--neon-green); color: #000; }
        .btn-outline { background: #151535; border: 3px solid #25254e; color: var(--text); }

        /* End Screen Log Component */
        .review-scroll {
            width: 100%;
            background: #050510;
            border-radius: 18px;
            padding: 10px;
            overflow-y: auto;
            flex-grow: 1;
            border: 2px solid #1e1e3f;
        }

        .review-card {
            padding: 10px;
            border-bottom: 1px solid #12122c;
            display: flex;
            flex-direction: column;
            font-size: 1rem;
            font-family: sans-serif;
            gap: 4px;
        }

        .status-correct { color: var(--neon-green); font-weight: bold; }
        .status-wrong { color: var(--neon-pink); font-weight: bold; }

        .flash-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            transition: opacity 0.08s ease;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }

        .shake-animation {
            animation: violentShake 0.15s linear infinite;
        }

        @keyframes violentShake {
            0% { transform: translate(2px, 1px); }
            20% { transform: translate(-3px, 0px); }
            40% { transform: translate(1px, -1px); }
            60% { transform: translate(-2px, 2px); }
            80% { transform: translate(-1px, -1px); }
            100% { transform: translate(2px, -2px); }
        }
    </style>
</head>

            </div>

            <div class="footer-action-area">
                <button class="action-btn btn-neon-pink" onclick="resetToHome()">PLAY AGAIN</button>
            </div>
        </div>
    </div>

            const btnSwap = document.getElementById('swap-action-btn');
            btnSwap.style.display = 'flex';
            document.getElementById('decision-header').textContent = "OFFERED LETTER";
            document.getElementById('decision-header').style.color = "var(--neon-pink)";
            
            currentSelectionLetter = baseAlphabet[Math.floor(Math.random() * baseAlphabet.length)];
            document.getElementById('big-letter').textContent = currentSelectionLetter;
            navigate(scrDecision);
        }

        function gambleLetter() {
            if (phaseStep === 1) {
                phaseStep = 2;
                const filteredPool = baseAlphabet.filter(l => l !== currentSelectionLetter);
                currentSelectionLetter = filteredPool[Math.floor(Math.random() * filteredPool.length)];
                
                document.getElementById('big-letter').textContent = currentSelectionLetter;
                document.getElementById('decision-header').textContent = "FORCED FINAL LETTER";
                document.getElementById('decision-header').style.color = "var(--neon-yellow)";
                document.getElementById('swap-action-btn').style.display = 'none';
                triggerBallisticEffects('var(--neon-pink)', true);
            }
        }

        function confirmLetter() {
            initiateGameplayLoop(currentSelectionLetter);
        }

        function initiateGameplayLoop(chosenLetter) {
            runningScore = 0;
            timeRemaining = selectedTimeLimit; 
            currentQuestionIdx = 0;
            historyLog = [];
            
            document.getElementById('hud-letter').textContent = chosenLetter;
            document.getElementById('hud-score').textContent = runningScore;
            document.getElementById('hud-timer').textContent = timeRemaining + "s";
            
            activeSessionQuestions = randomizedShuffle([...questionsList]);
            
            navigate(scrPlay);
            displayNextPrompt();

            countdownTimer = setInterval(() => {
                timeRemaining--;
                document.getElementById('hud-timer').textContent = timeRemaining + "s";
                if (timeRemaining <= 10) {
                    document.getElementById('hud-timer').style.background = 'var(--neon-pink)';
                    document.getElementById('hud-timer').style.color = '#fff';
                } else {
                    document.getElementById('hud-timer').style.background = 'var(--neon-yellow)';
                    document.getElementById('hud-timer').style.color = '#000';
                }
                if (timeRemaining <= 0) {
                    wrapUpSession();
                }
            }, 1000);
        }

        function displayNextPrompt() {
            if (currentQuestionIdx >= activeSessionQuestions.length) {
                activeSessionQuestions = randomizedShuffle([...questionsList]);
                currentQuestionIdx = 0;
            }
            const dataEntry = activeSessionQuestions[currentQuestionIdx];
            document.getElementById('live-emoji').textContent = dataEntry.e;
            document.getElementById('live-question').textContent = dataEntry.q;
        }

        function markOralPoint(isCorrect) {
            const activePrompt = activeSessionQuestions[currentQuestionIdx];
            
            if (isCorrect) {
                runningScore++;
                document.getElementById('hud-score').textContent = runningScore;
                triggerBallisticEffects('var(--neon-green)', false);
                historyLog.push({ q: activePrompt.q, type: 'correct', e: activePrompt.e });
            } else {
                triggerBallisticEffects('var(--neon-pink)', true);
                historyLog.push({ q: activePrompt.q, type: 'wrong', e: activePrompt.e });
            }

            currentQuestionIdx++;
            displayNextPrompt();
        }

        function wrapUpSession() {
            clearInterval(countdownTimer);
            triggerBallisticEffects('var(--neon-blue)', true);
            
            document.getElementById('summary-letter').textContent = currentSelectionLetter;
            document.getElementById('summary-score').textContent = runningScore;
            
            const listScroller = document.getElementById('score-log');
            listScroller.innerHTML = '';

            historyLog.forEach(entry => {
                const row = document.createElement('div');
                row.className = 'review-card';
                let statusLabel = entry.type === 'correct' ? 'status-correct' : 'status-wrong';
                let textMark = entry.type === 'correct' ? 'PASSED' : 'FAILED/SKIPPED';

                row.innerHTML = `
                    <span style="color: #fff; font-weight:bold;">${entry.e} Q: ${entry.q}</span>
                    <span class="${statusLabel}">OUTCOME: ${textMark}</span>
                `;
                listScroller.appendChild(row);
            });

            navigate(scrResults);
        }

        function resetToHome() {
            navigate(scrStart);
        }
    </script>
</body>
</html>
